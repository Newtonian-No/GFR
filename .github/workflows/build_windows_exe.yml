# .github/workflows/build_windows_exe.yml
name: Build Windows Executable

on:
  # 触发条件：当代码推送到 main 分支时
  push:
    branches:
      - main
  # 也可以手动触发
  workflow_dispatch:

jobs:
  build_windows:
    # 关键：指定在 Windows 虚拟机上运行
    runs-on: windows-latest 
    
    # 步骤
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 检查并下载您的仓库代码

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 使用您的项目所需的 Python 版本

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装项目依赖
        pip install -r requirements.txt
        
    - name: Run PyInstaller Build
      shell: powershell 
      run: |
        pyinstaller -D -w better_app.py --name GFR_App --collect-all back --collect-all pillow --collect-data ultralytics --add-data "back\weights;back\weights" --add-data "back\CT;back\CT" --add-data "back\networks;back\networks" --hidden-import "super_gradients" --hidden-import "shapely" --hidden-import "dill" --hidden-import "tabulate" --collect-all pillow --hidden-import "PIL._imaging" --hidden-import "PIL._imagingtk" --hidden-import "PIL._tkinter_finder" --hidden-import "PIL.Image" --hidden-import "PIL.PngImagePlugin"
            
    - name: Prepare Artifact
      shell: bash
      run: |
        # 压缩生成的 dist 文件夹，方便上传
        cd dist
        zip -r GFR_App_Windows.zip GFR_App/

    - name: Upload Artifact (可执行文件)
      uses: actions/upload-artifact@v4
      with:
        name: GFR_App-Windows-Release
        path: dist/GFR_App_Windows.zip
        
    # 可选：如果推送到 tag，可以创建 GitHub Release
    - name: Create Release (Optional)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/GFR_App_Windows.zip
        body: |
          # GFR App v${{ github.ref_name }}
          Windows 64-bit 可执行文件。